<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveSlide - Control PDF con gestos</title>
  </head>
  <body>
    <main class="app">
      <section class="viewer-panel">
        <header class="toolbar">
          <div>
            <h1>WaveSlide</h1>
            <p>Control de PDF con cámara + MediaPipe + MobileNetV2</p>
          </div>

          <div class="controls">
            <label class="file-button">
              Cargar PDF
              <input id="pdf-input" type="file" accept="application/pdf" />
            </label>
            <button id="prev-btn">Atrás</button>
            <button id="next-btn">Siguiente</button>
            <button id="zoom-out-btn">Zoom -</button>
            <button id="zoom-in-btn">Zoom +</button>
          </div>
        </header>

        <div class="pdf-wrapper">
          <canvas id="pdf-canvas"></canvas>
        </div>

        <p id="page-info">Carga un PDF para empezar.</p>
      </section>

      <aside class="camera-panel">
        <h2>Cámara</h2>

        <div class="video-box">
          <video id="webcam" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>

        <div class="status-card">
          <p><strong>Estado:</strong> <span id="status">Inicializando...</span></p>
          <p><strong>Gesto:</strong> <span id="gesture">---</span></p>
          <p><strong>Confianza:</strong> <span id="confidence">---</span></p>
          <p><strong>Acción:</strong> <span id="last-action">---</span></p>
        </div>

        <div class="legend">
          <h3>Mapeo sugerido</h3>
          <p><code>two_up</code> → siguiente página</p>
          <p><code>fist</code> → página anterior</p>
          <p><code>like</code> → zoom +</p>
          <p><code>call</code> → pantalla completa</p>
        </div>
      </aside>
    </main>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
